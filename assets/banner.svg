<svg width="900" height="160" viewBox="0 0 900 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="160" rx="12" fill="url(#bg)" />

  <!-- Accent bar -->
  <rect x="0" y="0" width="6" height="160" rx="3" fill="url(#accent)" />

  <!-- Icon: stylized pinch symbol -->
  <g transform="translate(48, 80)">
    <circle cx="0" cy="0" r="28" fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.6"/>
    <line x1="-10" y1="-10" x2="10" y2="10" stroke="#00d4ff" stroke-width="3" stroke-linecap="round"/>
    <line x1="10" y1="-10" x2="-10" y2="10" stroke="#7c3aed" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="5" fill="#00d4ff" opacity="0.9"/>
  </g>

  <!-- Title -->
  <text x="100" y="72" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace"
        font-size="38" font-weight="700" fill="#f0f6fc" letter-spacing="-1">
    pincherMCP
  </text>

  <!-- Tagline -->
  <text x="102" y="102" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="15" fill="#8b949e" letter-spacing="0.2">
    Codebase intelligence · Token savings · Any LLM · One binary
  </text>

  <!-- Stats row -->
  <g transform="translate(102, 130)" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12">
    <rect x="0" y="-14" width="90" height="20" rx="4" fill="#21262d"/>
    <text x="8" y="0" fill="#00d4ff">14 tools</text>

    <rect x="100" y="-14" width="120" height="20" rx="4" fill="#21262d"/>
    <text x="108" y="0" fill="#7c3aed">~90% coverage</text>

    <rect x="232" y="-14" width="108" height="20" rx="4" fill="#21262d"/>
    <text x="240" y="0" fill="#3fb950">pure Go · no CGO</text>

    <rect x="350" y="-14" width="130" height="20" rx="4" fill="#21262d"/>
    <text x="358" y="0" fill="#f0883e">SQLite WAL · v4</text>
  </g>
</svg>
