name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            test-flags: -timeout 120s
          - os: macos-latest
            test-flags: -timeout 120s
          - os: windows-latest
            # Windows SQLite I/O is ~10x slower; serialize package execution
            test-flags: -timeout 300s -p 1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... ${{ matrix.test-flags }}

      - name: Build
        run: go build ./cmd/pinch/

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test with coverage
        run: go test ./... -coverprofile=cover.out -timeout 120s

      - name: Check coverage threshold (84%)
        run: |
          TOTAL=$(go tool cover -func=cover.out | grep "^total" | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${TOTAL}%"
          awk -v t="$TOTAL" 'BEGIN { if (t+0 < 84) { print "Coverage " t "% is below 84% threshold"; exit 1 } }'

  # corpus-snapshot exercises the Makefile-driven snapshot pipeline (#33).
  # The Go-test gate (TestCorpusSnapshot_* in cmd/pinch/snapshot_test.go)
  # already covers the same diff logic, but this job additionally proves
  # the make + jq pipeline stays runnable — catches Makefile breakage and
  # missing dependencies that the Go tests would silently miss.
  #
  # ubuntu-only: jq isn't available by default on the Windows runner, and
  # the Go-side test gate covers cross-platform behaviour anyway.
  corpus-snapshot:
    name: Corpus snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify pinned-corpus snapshots
        run: make corpus-test

  # bench-smoke runs the #50 benchmark harness at a small benchtime to
  # prove benchmarks stay COMPILABLE and don't crash. Always required.
  bench-smoke:
    name: Benchmark smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run benchmarks (smoke only — 100ms per benchmark)
        run: |
          go test ./internal/index/ -run=^$ -bench=. -benchtime=100ms -benchmem
          go test ./internal/server/ -run=^$ -bench=. -benchtime=100ms -benchmem

  # bench-regression gates ns/op + allocs/op against the committed
  # baselines under testdata/bench/ (#50).
  #
  # CI uses wider thresholds (40% ns / 50% allocs) than local dev (20%/30%)
  # because the committed baselines are captured on developer hardware and
  # GitHub-hosted runners differ by more than the local noise floor on some
  # benchmarks. Cold-walk benchmarks like Index_Cold_K8sOps consistently
  # land +20% on CI vs the dev baseline; that's hardware mismatch, not a
  # regression. The wider CI threshold catches genuine regressions
  # (>+40% ns is well outside any documented runner variance) without
  # flapping on no-op PRs.
  #
  # `continue-on-error: true` is still set during phase 1 — promotion to
  # required gate waits on:
  #   1. Several CI runs at the wider thresholds without false positives
  #   2. Re-baselining via `make corpus-bench-update` on a CI run (so the
  #      thresholds can be tightened back to the local-dev numbers).
  bench-regression:
    name: Benchmark regression (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      BENCH_NS_THRESHOLD: "0.40"
      BENCH_ALLOCS_THRESHOLD: "0.50"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run regression gate
        run: make corpus-bench

      - name: Upload actual numbers
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-actual-${{ github.run_id }}
          path: testdata/bench/
          retention-days: 14
