name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            test-flags: -timeout 120s
          - os: macos-latest
            test-flags: -timeout 120s
          - os: windows-latest
            # Windows SQLite I/O is ~10x slower; serialize package execution
            test-flags: -timeout 300s -p 1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... ${{ matrix.test-flags }}

      - name: Build
        run: go build ./cmd/pinch/

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test with coverage
        run: go test ./... -coverprofile=cover.out -timeout 120s

      - name: Check coverage threshold (84%)
        run: |
          TOTAL=$(go tool cover -func=cover.out | grep "^total" | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${TOTAL}%"
          awk -v t="$TOTAL" 'BEGIN { if (t+0 < 84) { print "Coverage " t "% is below 84% threshold"; exit 1 } }'

  # corpus-snapshot exercises the Makefile-driven snapshot pipeline (#33).
  # The Go-test gate (TestCorpusSnapshot_* in cmd/pinch/snapshot_test.go)
  # already covers the same diff logic, but this job additionally proves
  # the make + jq pipeline stays runnable — catches Makefile breakage and
  # missing dependencies that the Go tests would silently miss.
  #
  # ubuntu-only: jq isn't available by default on the Windows runner, and
  # the Go-side test gate covers cross-platform behaviour anyway.
  corpus-snapshot:
    name: Corpus snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify pinned-corpus snapshots
        run: make corpus-test

  # bench-smoke runs the #50 benchmark harness at a small benchtime to
  # prove benchmarks stay COMPILABLE and don't crash. Always required.
  bench-smoke:
    name: Benchmark smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run benchmarks (smoke only — 100ms per benchmark)
        run: |
          go test ./internal/index/ -run=^$ -bench=. -benchtime=100ms -benchmem
          go test ./internal/server/ -run=^$ -bench=. -benchtime=100ms -benchmem

  # bench-regression gates ns/op + allocs/op against the committed
  # baselines under testdata/bench/ (#50).
  #
  # Status: the committed baselines were captured on developer hardware
  # (Windows i9-14900K). GitHub-hosted ubuntu-latest runners are ~2x
  # slower than the dev box on the server-package benchmarks
  # (HandleSearch / HandleQuery / HandleArchitecture all land +90-200%
  # vs the dev baseline; index-package benchmarks fit a 0.40 threshold).
  # That's hardware mismatch, not regression. Until we re-baseline on
  # CI hardware, the gate runs in sanity-only mode: thresholds wide
  # enough that only catastrophic regressions (>3x) trip it.
  #
  # The job ALSO uploads the CI-actual bench output as a separate
  # artifact (`bench-ci-actual-*`) — distinct from the committed
  # baseline upload — so a future PR can pull a green run's numbers
  # down and use them as the new CI-calibrated baseline. That's what
  # unlocks tightening the gate back toward the local-dev numbers.
  #
  # `continue-on-error: true` is still set; phase 1 ends when:
  #   1. Re-baseline on CI numbers (via the bench-ci-actual artifact)
  #   2. Tighten thresholds back to local-dev defaults (0.20 / 0.30)
  #   3. Remove `continue-on-error: true`
  bench-regression:
    name: Benchmark regression (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      # Sanity-only thresholds while CI baselines remain dev-machine
      # numbers. Tighten back to 0.20/0.30 once re-baselined on CI.
      BENCH_NS_THRESHOLD: "2.50"
      BENCH_ALLOCS_THRESHOLD: "1.00"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Capture CI bench output for re-baselining
        run: |
          mkdir -p ci-bench-actual
          go test ./internal/index/ -run='^$' -bench=. -benchtime=2s -benchmem \
            > ci-bench-actual/index.bench.txt
          go test ./internal/server/ -run='^$' -bench=. -benchtime=2s -benchmem \
            > ci-bench-actual/server.bench.txt

      - name: Compare against committed baseline (sanity gate)
        run: |
          go run ./cmd/benchcmp \
            -ns-threshold=$BENCH_NS_THRESHOLD \
            -allocs-threshold=$BENCH_ALLOCS_THRESHOLD \
            testdata/bench/index.bench.txt ci-bench-actual/index.bench.txt
          go run ./cmd/benchcmp \
            -ns-threshold=$BENCH_NS_THRESHOLD \
            -allocs-threshold=$BENCH_ALLOCS_THRESHOLD \
            testdata/bench/server.bench.txt ci-bench-actual/server.bench.txt

      - name: Upload CI-actual bench output (for re-baselining)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-ci-actual-${{ github.run_id }}
          path: ci-bench-actual/
          retention-days: 30
