name: Release

on:
  push:
    tags:
      - 'v*'
  # workflow_dispatch lets us re-run the binary build against an existing
  # tag from the Actions UI — useful when a transient infrastructure flake
  # (artifact-download retry exhaustion, ghcr.io hiccup) took down a
  # release run after the matrix builds succeeded. Trigger via the
  # Actions UI selecting the tag as the ref; GITHUB_REF_NAME picks up
  # the tag name automatically when the run starts from a tag ref.
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  binaries:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: windows
            goarch: arm64
            ext: .exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p dist
          BIN="pincher-${GITHUB_REF_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          go build -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "dist/${BIN}" \
            ./cmd/pinch/
          cd dist
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "pincher-${GITHUB_REF_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}.zip" "${BIN}"
          else
            tar -czf "pincher-${GITHUB_REF_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" "${BIN}"
          fi

      # Gate: stamped --version output must match the tag exactly. Catches
      # ldflags drift, accidental hardcoded fallbacks (the v0.6.0-stuck-default
      # bug we hit pre-#X), and version-bump misses. Runs only on native
      # linux/amd64 since we can't execute the cross-compiled binaries here.
      - name: Verify --version matches tag
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: |
          BIN="dist/pincher-${GITHUB_REF_NAME}-linux-amd64"
          STAMPED="$("$BIN" --version | awk '{print $NF}')"
          EXPECTED="v${GITHUB_REF_NAME#v}"
          echo "stamped:  $STAMPED"
          echo "expected: $EXPECTED"
          if [ "$STAMPED" != "$EXPECTED" ]; then
            echo "::error::pincher --version reported '$STAMPED' but tag is '${GITHUB_REF_NAME}' (expected '$EXPECTED')"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/pincher-*.tar.gz
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}-zip
          path: dist/pincher-*.zip
          if-no-files-found: ignore

  checksums:
    name: Checksums + GitHub Release
    needs: binaries
    runs-on: ubuntu-latest
    steps:
      # Checkout needed so the channel-detection step can shell out to
      # scripts/release-channel.sh — discovered the hard way on the
      # v0.54.0-beta.1 release run, which failed at the channel step
      # with "scripts/release-channel.sh: No such file or directory"
      # because this job runs on a fresh runner with no repo.
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum pincher-*.tar.gz pincher-*.zip > SHA256SUMS

      # #1524 FILE-E: sign each release artifact + SHA256SUMS with cosign
      # when COSIGN_PRIVATE_KEY is configured. Skipped (with a clear log
      # message) until the maintainer configures the secret — non-breaking:
      # unsigned releases still ship checksums.
      #
      # Setup (one-time, maintainer):
      #   cosign generate-key-pair                            # locally
      #   # Set repository secrets:
      #   #   COSIGN_PRIVATE_KEY = contents of cosign.key
      #   #   COSIGN_PASSWORD    = the passphrase used at generate-key-pair
      #   # Publish cosign.pub at https://github.com/kwad77/pincher/blob/master/cosign.pub
      #
      # Verify (any user, post-release):
      #   cosign verify-blob \
      #     --key https://raw.githubusercontent.com/kwad77/pincher/master/cosign.pub \
      #     --signature pincher-vX.Y.Z-linux-amd64.tar.gz.sig \
      #     pincher-vX.Y.Z-linux-amd64.tar.gz
      - name: Install cosign
        if: env.COSIGN_PRIVATE_KEY != ''
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        uses: sigstore/cosign-installer@v3

      - name: Sign release artifacts
        if: env.COSIGN_PRIVATE_KEY != ''
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cd dist
          # Write the private key to a temp file (cosign sign-blob reads
          # via --key path). Clean up on exit even if signing fails.
          tmp_key=$(mktemp)
          trap 'rm -f "$tmp_key"' EXIT
          printf '%s' "$COSIGN_PRIVATE_KEY" > "$tmp_key"

          for artifact in pincher-*.tar.gz pincher-*.zip SHA256SUMS; do
            echo "Signing $artifact"
            cosign sign-blob --yes --key "$tmp_key" \
              --output-signature "${artifact}.sig" \
              "$artifact"
          done

          echo "Signed artifacts:"
          ls -1 *.sig

      - name: Note unsigned release
        if: env.COSIGN_PRIVATE_KEY == ''
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        run: |
          echo "::warning::COSIGN_PRIVATE_KEY not configured — release ships unsigned (#1524 FILE-E)."
          echo "Maintainer: see docs/security/release-signing.md for setup."

      # #642: stable-channel rule — minor version divisible by 10 is a
      # stable promotion (v0.60, v0.70, ..., v1.0, v1.10, ...). Everything
      # else (v0.53, v0.54, ..., v0.59, v0.61, ...) is dev channel.
      # Pre-release suffixes (-beta.N, -alpha.N, -rc.N) override and are
      # always dev. Patch releases inherit their minor's channel
      # (v0.60.1 = stable; v0.53.1 = dev).
      - name: Determine release channel
        id: channel
        run: |
          # Delegate to the canonical detector (#642). The inline-duplicate
          # logic that lived here before the fix mis-labelled all pre-release
          # suffixes as "dev" — beta/alpha/rc tags showed up in the log as
          # "Release channel for v0.54.0-beta.1: dev" even though Docker
          # correctly tagged ghcr.io/.../pincher:beta and the GitHub release
          # was correctly marked prerelease. The downstream effects were
          # right; only the labelling was wrong. Now that
          # scripts/release-channel.sh is the canonical implementation
          # (CI-tested via scripts/release-channel_test.sh), the workflow
          # shells out to it instead of reimplementing in bash inline.
          CHANNEL="$(bash scripts/release-channel.sh "${GITHUB_REF_NAME}")"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "Release channel for ${GITHUB_REF_NAME}: $CHANNEL"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/pincher-*.tar.gz
            dist/pincher-*.zip
            dist/SHA256SUMS
            dist/*.sig
          generate_release_notes: true
          draft: false
          # Mark dev releases as prerelease so the GitHub UI shows them
          # under the "Pre-release" badge and `gh release list --latest`
          # skips them. Stable promotions stay unmarked.
          prerelease: ${{ steps.channel.outputs.channel != 'stable' }}

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          # #642: Docker tags follow scripts/release-channel.sh routing.
          # stable → latest + stable; dev → dev; beta/alpha/rc → matching
          # channel tag. The full tag (vX.Y.Z[-suffix]) and bare-version
          # tag always ship so consumers can pin to a specific release.
          IMG="ghcr.io/${GITHUB_REPOSITORY,,}"
          VERSION=${GITHUB_REF_NAME#v}
          TAGS="${IMG}:${GITHUB_REF_NAME},${IMG}:${VERSION}"
          CHANNEL="$(bash scripts/release-channel.sh "${GITHUB_REF_NAME}")"
          case "$CHANNEL" in
            stable) TAGS="${TAGS},${IMG}:latest,${IMG}:stable" ;;
            dev)    TAGS="${TAGS},${IMG}:dev"   ;;
            beta)   TAGS="${TAGS},${IMG}:beta"  ;;
            alpha)  TAGS="${TAGS},${IMG}:alpha" ;;
            rc)     TAGS="${TAGS},${IMG}:rc"    ;;
            *)
              echo "::error::unrecognised channel '$CHANNEL' for ${GITHUB_REF_NAME}"
              exit 1
              ;;
          esac
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          # #1793: surface the bare version so the Docker build can stamp
          # main.version via --build-arg — without it the in-image binary
          # reports `vdev` and install-validation's docker cell fails.
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Docker tags for ${GITHUB_REF_NAME} (channel=$CHANNEL): ${TAGS}"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.tags.outputs.version }}
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.licenses=MIT
          provenance: false

  homebrew:
    name: Bump Homebrew formula
    needs: checksums
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # #642: Homebrew formula tracks the stable channel only. Dev releases
    # (v0.53..v0.59, etc.) and pre-release suffixes (-beta.N) never bump
    # the formula. Users wanting dev/beta channels install via the
    # ghcr Docker `dev`/`beta` tags or `go install @vX.Y.Z` against the
    # specific dev tag.
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      # Verify the channel rule once more inside the job (defense in depth)
      # so a misconfigured `if:` above doesn't silently bump the formula
      # for a dev release.
      - name: Verify stable-channel rule
        run: |
          REF="${GITHUB_REF_NAME}"
          VER="${REF#v}"
          MINOR="$(echo "$VER" | awk -F. '{print $2}')"
          if ! [[ "$MINOR" =~ ^[0-9]+$ ]] || [[ $((MINOR % 10)) -ne 0 ]]; then
            echo "::warning::Skipping Homebrew bump for $REF — minor=$MINOR is not a stable promotion (minor % 10 != 0)."
            echo "SKIP_HOMEBREW=1" >> "$GITHUB_ENV"
          fi

      - uses: actions/checkout@v4
        if: env.SKIP_HOMEBREW != '1'
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch release SHA256SUMS
        id: hashes
        if: env.SKIP_HOMEBREW != '1'
        run: |
          set -euo pipefail
          URL="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/SHA256SUMS"
          # Give the release a brief moment to propagate (rarely needed — checksums
          # job already uploaded it — but cheap insurance against CDN lag).
          for i in 1 2 3 4 5; do
            if curl --fail -sL -o SHA256SUMS "$URL"; then break; fi
            echo "attempt $i failed; retrying in 5s"
            sleep 5
          done
          cat SHA256SUMS

          get_sha() { awk -v p="$1" '$2==p{print $1}' SHA256SUMS; }
          DARWIN_ARM=$(get_sha "pincher-${GITHUB_REF_NAME}-darwin-arm64.tar.gz")
          DARWIN_AMD=$(get_sha "pincher-${GITHUB_REF_NAME}-darwin-amd64.tar.gz")
          LINUX_ARM=$(get_sha  "pincher-${GITHUB_REF_NAME}-linux-arm64.tar.gz")
          LINUX_AMD=$(get_sha  "pincher-${GITHUB_REF_NAME}-linux-amd64.tar.gz")
          for name in DARWIN_ARM DARWIN_AMD LINUX_ARM LINUX_AMD; do
            val="${!name}"
            if [[ -z "$val" || ${#val} -ne 64 ]]; then
              echo "::error::missing or malformed sha for $name (got '$val')"
              exit 1
            fi
          done

          {
            echo "version=${GITHUB_REF_NAME#v}"
            echo "darwin_arm=$DARWIN_ARM"
            echo "darwin_amd=$DARWIN_AMD"
            echo "linux_arm=$LINUX_ARM"
            echo "linux_amd=$LINUX_AMD"
          } >> "$GITHUB_OUTPUT"

      - name: Patch formula
        if: env.SKIP_HOMEBREW != '1'
        env:
          VERSION: ${{ steps.hashes.outputs.version }}
          DARWIN_ARM: ${{ steps.hashes.outputs.darwin_arm }}
          DARWIN_AMD: ${{ steps.hashes.outputs.darwin_amd }}
          LINUX_ARM:  ${{ steps.hashes.outputs.linux_arm }}
          LINUX_AMD:  ${{ steps.hashes.outputs.linux_amd }}
          REF: ${{ github.ref_name }}
        run: |
          python3 - <<'PY'
          import os, re, pathlib
          p = pathlib.Path("packaging/homebrew/pincher.rb")
          s = p.read_text()
          s = re.sub(r'version "[^"]+"', f'version "{os.environ["VERSION"]}"', s)
          def patch(s, arch, sha):
              return re.sub(
                  rf'(-{re.escape(arch)}\.tar\.gz"\s*\n\s*sha256 ")[0-9a-f]{{64}}"',
                  rf'\g<1>{sha}"', s)
          s = patch(s, "darwin-arm64", os.environ["DARWIN_ARM"])
          s = patch(s, "darwin-amd64", os.environ["DARWIN_AMD"])
          s = patch(s, "linux-arm64",  os.environ["LINUX_ARM"])
          s = patch(s, "linux-amd64",  os.environ["LINUX_AMD"])
          # Keep the canonical "Pinned to" comment fresh
          s = re.sub(r'Pinned to v[0-9A-Za-z.\-]+\.',
                     f'Pinned to {os.environ["REF"]}.', s)
          s = re.sub(r'/v[0-9A-Za-z.\-]+/SHA256SUMS',
                     f'/{os.environ["REF"]}/SHA256SUMS', s)
          p.write_text(s)
          PY
          git diff --stat packaging/homebrew/pincher.rb

      - name: Commit to main repo
        if: env.SKIP_HOMEBREW != '1'
        run: |
          set -euo pipefail
          if git diff --quiet packaging/homebrew/pincher.rb; then
            echo "formula unchanged; nothing to commit"
            exit 0
          fi
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add packaging/homebrew/pincher.rb
          git commit -m "chore(homebrew): bump formula to ${GITHUB_REF_NAME}

          Automated bump from .github/workflows/release.yml after the
          ${GITHUB_REF_NAME} release produced its SHA256SUMS."
          git push origin HEAD:master

      - name: Mirror to tap repo
        if: env.SKIP_HOMEBREW != '1'
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${TAP_TOKEN:-}" ]]; then
            echo "::warning::HOMEBREW_TAP_TOKEN not set — skipping tap mirror."
            echo "::warning::Users will need to install via direct-URL until the tap is updated manually."
            exit 0
          fi
          git clone --depth 1 "https://x-access-token:${TAP_TOKEN}@github.com/kwad77/homebrew-pincher.git" tap
          cp packaging/homebrew/pincher.rb tap/Formula/pincher.rb
          cd tap
          if git diff --quiet Formula/pincher.rb; then
            echo "tap formula already matches; nothing to push"
            exit 0
          fi
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add Formula/pincher.rb
          git commit -m "Bump to ${GITHUB_REF_NAME}

          Mirrored from kwad77/pincher@master packaging/homebrew/pincher.rb
          after the ${GITHUB_REF_NAME} release automation ran."
          git push origin master

  scoop:
    name: Bump Scoop manifest
    # #1702: runs AFTER homebrew (not in parallel) so the two
    # `push origin master` commits serialise — a concurrent push would
    # fail non-fast-forward. needs: homebrew transitively waits on
    # checksums too. homebrew completes (job-success) even when its
    # steps are channel-skipped, so this still runs on dev releases —
    # where its own SKIP_SCOOP gate then skips it.
    needs: homebrew
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # #642 channel rule: the scoop manifest, like the Homebrew formula,
    # tracks the stable channel only. The raw-URL install path the docs
    # advertise serves whatever `master` holds.
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - name: Verify stable-channel rule
        run: |
          REF="${GITHUB_REF_NAME}"
          VER="${REF#v}"
          MINOR="$(echo "$VER" | awk -F. '{print $2}')"
          if ! [[ "$MINOR" =~ ^[0-9]+$ ]] || [[ $((MINOR % 10)) -ne 0 ]]; then
            echo "::warning::Skipping Scoop bump for $REF — minor=$MINOR is not a stable promotion (minor % 10 != 0)."
            echo "SKIP_SCOOP=1" >> "$GITHUB_ENV"
          fi

      - uses: actions/checkout@v4
        if: env.SKIP_SCOOP != '1'
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch SHA256SUMS + patch manifest
        if: env.SKIP_SCOOP != '1'
        run: |
          set -euo pipefail
          URL="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/SHA256SUMS"
          for i in 1 2 3 4 5; do
            if curl --fail -sL -o SHA256SUMS "$URL"; then break; fi
            echo "attempt $i failed; retrying in 5s"
            sleep 5
          done
          get_sha() { awk -v p="$1" '$2==p{print $1}' SHA256SUMS; }
          WIN_AMD=$(get_sha "pincher-${GITHUB_REF_NAME}-windows-amd64.zip")
          WIN_ARM=$(get_sha "pincher-${GITHUB_REF_NAME}-windows-arm64.zip")
          for name in WIN_AMD WIN_ARM; do
            val="${!name}"
            if [[ -z "$val" || ${#val} -ne 64 ]]; then
              echo "::error::missing or malformed sha for $name (got '$val')"
              exit 1
            fi
          done
          VERSION="${GITHUB_REF_NAME#v}" WIN_AMD="$WIN_AMD" WIN_ARM="$WIN_ARM" python3 - <<'PY'
          import os, json, pathlib
          v = os.environ["VERSION"]
          p = pathlib.Path("packaging/scoop/pincher.json")
          # Explicit UTF-8 + ensure_ascii=False so a non-ASCII char in the
          # manifest (the description carries a `§`) round-trips byte-
          # faithfully instead of being escaped or, on a non-UTF-8 locale,
          # corrupted.
          d = json.loads(p.read_text(encoding="utf-8"))
          d["version"] = v
          base = "https://github.com/kwad77/pincher/releases/download"
          for label, arch, sha in (
              ("64bit", "amd64", os.environ["WIN_AMD"]),
              ("arm64", "arm64", os.environ["WIN_ARM"]),
          ):
              a = d["architecture"][label]
              a["url"] = f"{base}/v{v}/pincher-v{v}-windows-{arch}.zip"
              a["hash"] = sha
              a["bin"] = [[f"pincher-v{v}-windows-{arch}.exe", "pincher"]]
          p.write_text(json.dumps(d, indent=4, ensure_ascii=False) + "\n", encoding="utf-8")
          PY
          git diff --stat packaging/scoop/pincher.json

      - name: Commit to main repo
        if: env.SKIP_SCOOP != '1'
        run: |
          set -euo pipefail
          if git diff --quiet packaging/scoop/pincher.json; then
            echo "manifest unchanged; nothing to commit"
            exit 0
          fi
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add packaging/scoop/pincher.json
          git commit -m "chore(scoop): bump manifest to ${GITHUB_REF_NAME}

          Automated bump from .github/workflows/release.yml after the
          ${GITHUB_REF_NAME} release produced its SHA256SUMS."
          git push origin HEAD:master
