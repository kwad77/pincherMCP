name: Host conformance

# FILE-M #1532 (v0.87 corpus) + FILE-R #1536 (v0.91 gate promotion).
#
# Replays per-host canonical workflows under
# testdata/host-conformance/<host>/ against a freshly-built pincher
# and validates responses against expectations.json. Drift caught
# here would break the listed host's canonical flow.
#
# Phase: v0.87 — advisory (informational; failure did NOT block merge
#                or release).
#        v0.91 — REQUIRED (#1536 FILE-R): the job no longer carries
#                `continue-on-error`, so a failed replay blocks the PR
#                — including the release-prep PR, hence the tag. Listed
#                in CLAUDE.md required-gates. On failure the per-host
#                replay transcripts upload as an artifact.

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  host-conformance:
    name: host-conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build pincher
        run: go build -trimpath -ldflags="-s -w" -o ./pincher ./cmd/pinch/

      - name: Install jq
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update -y && sudo apt-get install -y jq
          fi
          jq --version

      - name: Run host-conformance replay
        env:
          PINCHER_BIN: ${{ github.workspace }}/pincher
          # #1536: scratch root the script keeps on exit so the next
          # step can upload the per-host transcripts.
          HOSTCONF_OUT_DIR: ${{ github.workspace }}/host-conformance-out
        # Invoke via bash explicitly so a Windows-set file-mode (no
        # executable bit) doesn't trip the runner — the script is
        # POSIX bash regardless of who committed it.
        run: bash scripts/host-conformance.sh all

      # #1536: on a failed replay, upload each host's request/response
      # streams + stderr for offline investigation. The `data/` index
      # DB is excluded — it's scratch, not a transcript.
      - name: Upload per-host transcripts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: host-conformance-transcripts
          path: host-conformance-out/host-*
          if-no-files-found: warn
